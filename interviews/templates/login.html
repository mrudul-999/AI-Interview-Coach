{% extends 'base.html' %}

{% block content %}
<div class="glass-card" style="max-width: 400px; margin: 0 auto;">
    <h2 style="text-align: center; color: var(--accent);">Login</h2>
    
    <!-- Notice we are using standard POST here, not HTMX! -->
    <form method="post">
        {% csrf_token %}
        
        <!-- Django automatically builds the inputs based on the form object -->
        <div style="margin-top: 1rem;">
            {{ form.as_p }}
        </div>
        
        <button type="submit" class="btn-primary" style="margin-top: 1rem;">Log In</button>
    </form>
</div>
{% endblock content %}
